; PlatformIO configuration for Upright Go C++ firmware
; Uses cached toolchain from C:\Users\Joel\.platformio\

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

upload_port   = COM4
monitor_port  = COM4
monitor_speed = 115200
upload_speed  = 921600

; LittleFS for web UI assets
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv

; Third-party libraries
lib_deps =
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

; Compiler flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -std=gnu++17

build_unflags =
    -std=gnu++11
    -std=gnu++14
